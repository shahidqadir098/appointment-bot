<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Bot</title>

<style>
body {
    font-family: Arial;
    background: #f5f7fb;
    margin: 0;
}

.container {
    width: 400px;
    margin: 50px auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    background: #007bff;
    color: white;
    text-align: center;
    border-radius: 10px 10px 0 0;
}

.chat-box {
    height: 400px;
    overflow-y: auto;
    padding: 10px;
}

.message {
    margin: 8px 0;
}

.user {
    text-align: right;
    color: #007bff;
}

.bot {
    text-align: left;
    color: #333;
}

.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

<input type="date" id="datePicker" style="display:none; margin:10px;">
<input type="time" id="timePicker" style="display:none; margin:10px;">

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    margin-left: 10px;
    padding: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
    Appointment Booking
</div>

<div id="chat" class="chat-box"></div>

<div class="input-area">
    <input id="msg" placeholder="Type message..." />
    <button onclick="send()">Send</button>
</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
