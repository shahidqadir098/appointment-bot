<!DOCTYPE html>
<html>
<head>
    <title>Appointment Booking</title>

    <!-- ✅ MOBILE FIX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        /* Main container */
        .container {
            max-width: 500px;
            height: 100vh;
            margin: auto;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* Header */
        .header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        /* Chat area */
        .chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Messages */
        .message {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #eaeaea;
        }

        /* Input area */
        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ccc;
            background: white;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        .input-area button {
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        Appointment Booking
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function addMessage(text, className) {
    const chatBox = document.getElementById("chat-box");

    const div = document.createElement("div");
    div.className = "message " + className;
    div.innerText = text;

    chatBox.appendChild(div);

    // Auto scroll
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage() {
    const input = document.getElementById("message");
    const message = input.value.trim();

    if (message === "") return;

    addMessage(message, "user");

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message,
            user_id: "user1"
        })
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");
    });

    input.value = "";
}

// Enter key support
document.getElementById("message").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

// Initial message
window.onload = function() {
    addMessage("Hi! Type 'book' to start appointment booking.", "bot");
};
</script>

</body>
</html>
